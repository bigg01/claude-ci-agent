<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Claude CI Agent logo">
  <title>Claude CI Agent</title>
  <defs>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.8" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd9a8"/>
      <stop offset="45%" stop-color="#ff9d2e"/>
      <stop offset="100%" stop-color="#ff7a00"/>
    </radialGradient>
  </defs>

  <!-- Containment hexagon: the rootless sandbox -->
  <polygon points="64,10 110,37 110,91 64,118 18,91 18,37"
           fill="none" stroke="#25e8ff" stroke-width="3.2"
           stroke-linejoin="round" filter="url(#glow)"/>
  <polygon points="64,22 99,43 99,85 64,106 29,85 29,43"
           fill="none" stroke="#0fb6cc" stroke-width="1" opacity="0.5"/>

  <!-- Circuit traces: CI inputs (left) feed the core, telemetry exports (right) -->
  <g stroke="#25e8ff" stroke-width="2.6" fill="none" stroke-linecap="round"
     stroke-linejoin="round" filter="url(#glow)">
    <path d="M33 48 H49 V60"/>
    <path d="M33 80 H49 V68"/>
    <path d="M79 64 H99"/>
  </g>

  <!-- Input nodes -->
  <circle cx="33" cy="48" r="4.4" fill="#25e8ff" filter="url(#glow)"/>
  <circle cx="33" cy="80" r="4.4" fill="#25e8ff" filter="url(#glow)"/>
  <!-- Telemetry export node (orange "program" accent) -->
  <circle cx="99" cy="64" r="5.2" fill="#ff9d2e" filter="url(#glow)"/>

  <!-- Core: a Claude-style spark inside a cyan ring -->
  <circle cx="64" cy="64" r="15" fill="none" stroke="#25e8ff" stroke-width="2.4" filter="url(#glow)"/>
  <g stroke="url(#core)" stroke-width="3.2" stroke-linecap="round" filter="url(#glow)">
    <line x1="64" y1="51" x2="64" y2="77"/>
    <line x1="51" y1="64" x2="77" y2="64"/>
    <line x1="55" y1="55" x2="73" y2="73"/>
    <line x1="73" y1="55" x2="55" y2="73"/>
  </g>
  <circle cx="64" cy="64" r="3.4" fill="#ffd9a8"/>
</svg>
