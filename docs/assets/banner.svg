<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 240" role="img" aria-label="Claude CI Agent">
  <title>Claude CI Agent</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#03060b"/>
      <stop offset="100%" stop-color="#061018"/>
    </linearGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd9a8"/>
      <stop offset="45%" stop-color="#ff9d2e"/>
      <stop offset="100%" stop-color="#ff7a00"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0 H0 V44" fill="none" stroke="#25e8ff" stroke-width="1" opacity="0.07"/>
    </pattern>
  </defs>

  <!-- Backdrop + Tron grid floor -->
  <rect x="0" y="0" width="1000" height="240" rx="18" fill="url(#bg)"/>
  <rect x="0" y="0" width="1000" height="240" rx="18" fill="url(#grid)"/>
  <rect x="0.5" y="0.5" width="999" height="239" rx="18" fill="none" stroke="#0fb6cc" stroke-width="1" opacity="0.5"/>

  <!-- Logo mark -->
  <g transform="translate(60,56) scale(1.0)">
    <polygon points="64,10 110,37 110,91 64,118 18,91 18,37"
             fill="none" stroke="#25e8ff" stroke-width="3.2" stroke-linejoin="round" filter="url(#glow)"/>
    <g stroke="#25e8ff" stroke-width="2.6" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
      <path d="M33 48 H49 V60"/>
      <path d="M33 80 H49 V68"/>
      <path d="M79 64 H99"/>
    </g>
    <circle cx="33" cy="48" r="4.4" fill="#25e8ff" filter="url(#glow)"/>
    <circle cx="33" cy="80" r="4.4" fill="#25e8ff" filter="url(#glow)"/>
    <circle cx="99" cy="64" r="5.2" fill="#ff9d2e" filter="url(#glow)"/>
    <circle cx="64" cy="64" r="15" fill="none" stroke="#25e8ff" stroke-width="2.4" filter="url(#glow)"/>
    <g stroke="url(#core)" stroke-width="3.2" stroke-linecap="round" filter="url(#glow)">
      <line x1="64" y1="51" x2="64" y2="77"/>
      <line x1="51" y1="64" x2="77" y2="64"/>
      <line x1="55" y1="55" x2="73" y2="73"/>
      <line x1="73" y1="55" x2="55" y2="73"/>
    </g>
    <circle cx="64" cy="64" r="3.4" fill="#ffd9a8"/>
  </g>

  <!-- Wordmark. textLength + lengthAdjust forces the text to a fixed width so it
       can never overflow, regardless of which font the renderer falls back to. -->
  <g font-family="'Orbitron','Segoe UI',Verdana,sans-serif">
    <text x="230" y="116" fill="#25e8ff" font-size="54" font-weight="700"
          textLength="700" lengthAdjust="spacingAndGlyphs"
          filter="url(#glow)">CLAUDE CI AGENT</text>
    <text x="232" y="158" fill="#9fc7d2" font-size="19" font-weight="500"
          textLength="700" lengthAdjust="spacingAndGlyphs">Autonomous CI teammate · rootless Podman · OTel-audited</text>
    <rect x="232" y="174" width="700" height="3" rx="1.5" fill="#ff9d2e" filter="url(#glow)"/>
  </g>
</svg>
