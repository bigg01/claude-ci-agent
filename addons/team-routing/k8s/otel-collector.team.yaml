# Per-team OTel Collector — Deployment + Service. Render one per DevOps/SRE team.
#
# Placeholders (${...}) are filled by render.sh via envsubst:
#   TEAM         team slug, e.g. sre-payments   → resources named otel-collector-<team>
#   NAMESPACE    target namespace (default: observability)
#   ES_ENDPOINT  Elasticsearch URL the collector exports to
#   COLLECTOR_IMAGE  contrib image (has the elasticsearch exporter + transform)
#
# The collector config lives in the ConfigMap otel-collector-${TEAM}, created by
# render.sh from collector-config.team.yaml. OTEL_TEAM below makes the collector
# write only to claude-agent-${TEAM}-*.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector-${TEAM}
  namespace: ${NAMESPACE}
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/instance: ${TEAM}
    team: ${TEAM}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: otel-collector
      app.kubernetes.io/instance: ${TEAM}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: otel-collector
        app.kubernetes.io/instance: ${TEAM}
        team: ${TEAM}
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001              # OpenShift: delete runAsUser/runAsGroup
        runAsGroup: 0
        fsGroup: 0
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: otel-collector
          image: ${COLLECTOR_IMAGE}
          args: ["--config=/etc/otelcol/config.yaml"]
          env:
            - name: OTEL_TEAM
              value: "${TEAM}"
            - name: ES_ENDPOINT
              value: "${ES_ENDPOINT}"
          ports:
            - { name: otlp-http, containerPort: 4318 }
            - { name: otlp-grpc, containerPort: 4317 }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits:   { cpu: 500m, memory: 512Mi }
          volumeMounts:
            - { name: config, mountPath: /etc/otelcol, readOnly: true }
      volumes:
        - name: config
          configMap:
            name: otel-collector-${TEAM}
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector-${TEAM}
  namespace: ${NAMESPACE}
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/instance: ${TEAM}
    team: ${TEAM}
spec:
  selector:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/instance: ${TEAM}
  ports:
    - { name: otlp-http, port: 4318, targetPort: 4318 }
    - { name: otlp-grpc, port: 4317, targetPort: 4317 }
# Agents on this team point OTEL_EXPORTER_OTLP_ENDPOINT at:
#   http://otel-collector-${TEAM}.${NAMESPACE}:4318
