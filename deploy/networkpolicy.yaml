# Default-deny NetworkPolicy for the Claude CI agent — works on AKS and OpenShift.
#
# AKS enforces NetworkPolicy via Azure Network Policy Manager, Calico, or Cilium
# (the cluster must be created with a network policy engine enabled). OpenShift
# enforces it via OVN-Kubernetes. The resource itself is standard Kubernetes.
#
# Effect: the agent pod may NOT talk to the rest of the cluster or the host. Egress
# is restricted to DNS plus HTTPS, which is all the agent needs to reach the
# Anthropic API. Tighten the egress CIDR further if you front the API via a proxy.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: claude-agent-deny
  labels:
    app.kubernetes.io/name: claude-ci-agent
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: claude-ci-agent
  policyTypes:
    - Ingress
    - Egress
  ingress: []                          # deny all ingress
  egress:
    # DNS resolution.
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Outbound HTTPS (Anthropic API). Replace 0.0.0.0/0 with the API egress CIDR
    # or a proxy address to lock this down further.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 169.254.0.0/16         # block link-local / cloud metadata (IMDS)
      ports:
        - protocol: TCP
          port: 443
