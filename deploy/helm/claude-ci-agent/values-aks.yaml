# AKS overlay (and standard Kubernetes with the "restricted" Pod Security Standard).
#
#   helm install ci ./deploy/helm/claude-ci-agent -f deploy/helm/claude-ci-agent/values-aks.yaml
#
# AKS requires the image to declare a non-root UID itself (runAsNonRoot +
# runAsUser), which the base values already do — so this overlay mostly just
# pins the platform and uses Ingress for any external exposure.
platform: aks

# securityContext inherits the base values (runAsUser 1001 / runAsGroup 0 / fsGroup 0).

ingress:
  enabled: false      # set true + host to expose the collector externally
  className: ""
  host: ""

route:
  enabled: false      # Routes are OpenShift-only
