{{- if .Values.agent.enabled -}}
{{- $bao := .Values.openbao -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "claude.fullname" . }}-agent
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "claude.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent
spec:
  backoffLimit: {{ .Values.agent.backoffLimit }}
  ttlSecondsAfterFinished: {{ .Values.agent.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        {{- include "claude.labels" . | nindent 8 }}
        app.kubernetes.io/component: agent
      {{- if $bao.enabled }}
      annotations:
        # OpenBao keeps Vault's Agent Injector annotation API. The pod's
        # ServiceAccount authenticates via OpenBao's Kubernetes auth (no static
        # secret); the injector renders the KV secret into /vault/secrets/env.
        {{ $bao.injectorAnnotationPrefix }}/agent-inject: "true"
        {{ $bao.injectorAnnotationPrefix }}/role: {{ $bao.role | quote }}
        {{ $bao.injectorAnnotationPrefix }}/service: {{ $bao.address | quote }}
        {{ $bao.injectorAnnotationPrefix }}/agent-inject-secret-env: {{ $bao.secretPath | quote }}
        {{ $bao.injectorAnnotationPrefix }}/agent-inject-template-env: |
          {{`{{- with secret "`}}{{ $bao.secretPath }}{{`" -}}`}}
          {{- range $bao.keys }}
          export {{ . }}={{ printf "{{ .Data.data.%s }}" . }}
          {{- end }}
          {{`{{- end -}}`}}
      {{- end }}
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "claude.serviceAccountName" . }}
      # OpenBao injector needs the SA token to auth; otherwise don't mount it.
      automountServiceAccountToken: {{ $bao.enabled }}
      securityContext:
        {{- include "claude.podSecurityContext" . | nindent 8 }}
      containers:
        - name: agent
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              {{- if $bao.enabled }}
              # Load OpenBao-injected secrets (ANTHROPIC_API_KEY, GIT_PUSH_TOKEN, ...).
              [ -f /vault/secrets/env ] && . /vault/secrets/env
              {{- end }}
              claude -p "{{ .Values.agent.task }}" \
                --model "$CLAUDE_MODEL" \
                --permission-mode bypassPermissions \
                --dangerously-skip-permissions
          env:
            - { name: CLAUDE_MODEL, value: {{ .Values.agent.model | quote }} }
            - { name: OTEL_TEAM, value: {{ .Values.team | quote }} }
            - { name: CLAUDE_CODE_ENABLE_TELEMETRY, value: "1" }
            - { name: OTEL_LOG_TOOL_CONTENT, value: "1" }
            - { name: OTEL_METRICS_EXPORTER, value: "otlp" }
            - { name: OTEL_LOGS_EXPORTER, value: "otlp" }
            - { name: OTEL_EXPORTER_OTLP_PROTOCOL, value: "http/protobuf" }
            - { name: OTEL_EXPORTER_OTLP_ENDPOINT, value: {{ include "claude.otelEndpoint" . | quote }} }
            - { name: OTEL_RESOURCE_ATTRIBUTES, value: "ci.system=k8s,team.name={{ .Values.team }}" }
            {{- if and (not $bao.enabled) .Values.secrets.existingSecret }}
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret }}
                  key: ANTHROPIC_API_KEY
            {{- end }}
          securityContext:
            {{- include "claude.containerSecurityContext" . | nindent 12 }}
          resources:
            {{- toYaml .Values.agent.resources | nindent 12 }}
          volumeMounts:
            # readOnlyRootFilesystem=true → the agent needs writable scratch dirs.
            - { name: workspace, mountPath: /workspace }
            - { name: home, mountPath: /opt/agent-home }
            - { name: tmp, mountPath: /tmp }
      volumes:
        - { name: workspace, emptyDir: {} }
        - { name: home, emptyDir: {} }
        - { name: tmp, emptyDir: {} }
{{- end }}
