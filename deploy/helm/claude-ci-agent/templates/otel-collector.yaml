{{- if .Values.collector.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "claude.collectorName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "claude.labels" . | nindent 4 }}
    app.kubernetes.io/component: otel-collector
spec:
  replicas: {{ .Values.collector.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: otel-collector
  template:
    metadata:
      labels:
        {{- include "claude.labels" . | nindent 8 }}
        app.kubernetes.io/component: otel-collector
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/otel-configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "claude.serviceAccountName" . }}
      automountServiceAccountToken: false
      securityContext:
        {{- include "claude.podSecurityContext" . | nindent 8 }}
      containers:
        - name: otel-collector
          image: {{ .Values.collector.image }}
          args: ["--config=/etc/otelcol/config.yaml"]
          env:
            - { name: OTEL_TEAM, value: {{ .Values.team | quote }} }
            - { name: ES_ENDPOINT, value: {{ .Values.collector.elasticsearch.endpoint | quote }} }
          ports:
            - { name: otlp-http, containerPort: {{ .Values.collector.service.otlpHttpPort }} }
            - { name: otlp-grpc, containerPort: {{ .Values.collector.service.otlpGrpcPort }} }
          securityContext:
            {{- include "claude.containerSecurityContext" . | nindent 12 }}
          resources:
            {{- toYaml .Values.collector.resources | nindent 12 }}
          volumeMounts:
            - { name: config, mountPath: /etc/otelcol, readOnly: true }
            {{- if .Values.certManager.enabled }}
            - { name: tls, mountPath: /etc/otel/tls, readOnly: true }
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "claude.collectorName" . }}
        {{- if .Values.certManager.enabled }}
        - name: tls
          secret:
            secretName: {{ include "claude.collectorName" . }}-tls
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "claude.collectorName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "claude.labels" . | nindent 4 }}
    app.kubernetes.io/component: otel-collector
spec:
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: otel-collector
  ports:
    - { name: otlp-http, port: {{ .Values.collector.service.otlpHttpPort }}, targetPort: otlp-http }
    - { name: otlp-grpc, port: {{ .Values.collector.service.otlpGrpcPort }}, targetPort: otlp-grpc }
{{- end }}
