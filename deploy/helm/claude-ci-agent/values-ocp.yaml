# OpenShift overlay.
#
#   helm install ci ./deploy/helm/claude-ci-agent -f deploy/helm/claude-ci-agent/values-ocp.yaml
#
# The restricted-v2 SCC injects an arbitrary, namespace-scoped UID/GID at admission.
# A hardcoded runAsUser outside that range is REJECTED — so we null those fields and
# let the SCC assign them. The image's group-writable paths (USER 1001:0, chmod g=u)
# keep it working under whatever UID the SCC picks. External exposure uses a Route.
platform: ocp

securityContext:
  pod:
    runAsNonRoot: true
    runAsUser: null      # SCC assigns
    runAsGroup: null     # SCC assigns
    fsGroup: null        # SCC assigns
    seccompProfile:
      type: RuntimeDefault

route:
  enabled: false         # set true + host to expose the collector via a Route
  host: ""

ingress:
  enabled: false         # use Route on OpenShift, not Ingress
