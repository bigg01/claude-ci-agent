# Default values for the claude-ci-agent chart.
# Base values target AKS (and any standard Kubernetes with the "restricted" Pod
# Security Standard). For OpenShift, apply values-ocp.yaml on top — it removes the
# hardcoded UID/GID so the restricted-v2 SCC can inject its own, and switches
# external exposure from Ingress to Route.
#
#   AKS:        helm install ci ./deploy/helm/claude-ci-agent -f values-aks.yaml
#   OpenShift:  helm install ci ./deploy/helm/claude-ci-agent -f values-ocp.yaml

# "aks" or "ocp" — drives the small platform differences (securityContext + Route/Ingress).
platform: aks

nameOverride: ""
fullnameOverride: ""

# The DevOps/SRE team that owns this deployment's telemetry (OTEL_TEAM →
# claude-agent-<team>-* indices). See the team-routing addon.
team: default

image:
  repository: ghcr.io/bigg01/claude-ci-agent/claude-agent
  # Empty → defaults to the chart's appVersion (this release). Override to pin a
  # specific published tag (e.g. a commit SHA or "latest").
  tag: ""
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: ""
  annotations: {}

# --- The agent Job ---------------------------------------------------------
agent:
  enabled: true
  model: claude-sonnet-4-6
  task: "Review the repository per CLAUDE.MD and fix the most pressing issue."
  backoffLimit: 0
  ttlSecondsAfterFinished: 300
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: "1",  memory: 1Gi }

# --- The per-team OTel Collector (Deployment + Service) ---------------------
collector:
  enabled: true
  image: otel/opentelemetry-collector-contrib:latest
  replicas: 1
  elasticsearch:
    endpoint: http://elasticsearch:9200
  service:
    otlpHttpPort: 4318
    otlpGrpcPort: 4317
  resources:
    requests: { cpu: 50m,  memory: 128Mi }
    limits:   { cpu: 500m, memory: 512Mi }

# OTLP endpoint the agent exports to. Empty → the in-cluster collector service
# (https when cert-manager is enabled, otherwise http).
otelEndpoint: ""

# --- Secrets: where ANTHROPIC_API_KEY / GIT_PUSH_TOKEN / ELASTIC creds come from
# Either reference a pre-created Secret, or let OpenBao inject them (below).
secrets:
  existingSecret: ""   # name of a Secret with ANTHROPIC_API_KEY, etc. (used when OpenBao is off)

# --- OpenBao (Vault-compatible) --------------------------------------------
# Uses the OpenBao/Vault Agent Injector with Kubernetes auth: the pod's
# ServiceAccount token authenticates to OpenBao (no static secret in the chart).
# Requires the injector installed in the cluster and a role bound to this SA.
openbao:
  enabled: false
  injectorAnnotationPrefix: "vault.hashicorp.com"  # OpenBao keeps Vault's annotation API
  address: "https://openbao.example.com"
  role: "claude-ci-agent"
  secretPath: "secret/data/claude-ci-agent"        # KV v2 data path
  # Keys to render into /vault/secrets/env and source before the agent runs.
  keys:
    - ANTHROPIC_API_KEY
    - GIT_PUSH_TOKEN

# --- cert-manager: TLS for the collector's OTLP endpoint -------------------
# Issues a serving certificate for the collector Service and enables receiver TLS,
# so agents send OTLP over https. Requires cert-manager + the referenced Issuer.
certManager:
  enabled: false
  issuerRef:
    name: ""           # e.g. "ca-issuer"
    kind: ClusterIssuer  # ClusterIssuer or Issuer
  duration: 2160h      # 90d
  renewBefore: 360h    # 15d
  extraDnsNames: []    # additional SANs beyond the in-cluster service DNS

networkPolicy:
  enabled: true

# External exposure of the collector (optional). Route on OCP, Ingress on AKS.
route:        # OpenShift
  enabled: false
  host: ""
ingress:      # AKS / standard
  enabled: false
  className: ""
  host: ""
  annotations: {}

# Pod/container securityContext. The OCP overlay nulls runAsUser/runAsGroup/fsGroup
# so the SCC assigns them; null fields are omitted from the rendered manifest.
securityContext:
  pod:
    runAsNonRoot: true
    runAsUser: 1001
    runAsGroup: 0
    fsGroup: 0
    seccompProfile:
      type: RuntimeDefault
  container:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: ["ALL"]
