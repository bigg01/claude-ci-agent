# OpenTelemetry Collector sidecar config for the Claude CI agent.
#
# Per CLAUDE.MD: the agent emits OTLP over HTTP to http://localhost:4318; this
# sidecar scrubs secrets and exports the audit trail to Elastic. The Elastic
# endpoint + token are injected from CI secrets via env vars — never hard-coded
# here (zero-credential environment).
receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  # Bound buffer growth so a burst of tool-content logs can't exhaust the sidecar
  # (CLAUDE.MD: "avoid dumping vast buffers ... to prevent OTel buffer exhaustion").
  memory_limiter:
    check_interval: 1s
    limit_mib: 256
    spike_limit_mib: 64

  batch:
    send_batch_size: 512
    timeout: 5s

  # Secret scrubbing: redact common credential shapes before anything leaves the
  # sidecar. OTEL_LOG_TOOL_CONTENT=1 streams tool I/O, so redaction is mandatory.
  transform/scrub:
    error_mode: ignore
    log_statements:
      - context: log
        statements:
          - replace_pattern(body, "(?i)(api[_-]?key|token|secret|password|bearer)\\s*[=:]\\s*\\S+", "$$1=***REDACTED***")
          - replace_pattern(body, "sk-ant-[A-Za-z0-9_-]+", "***REDACTED_ANTHROPIC_KEY***")
          - replace_pattern(body, "gh[pousr]_[A-Za-z0-9]+", "***REDACTED_GITHUB_TOKEN***")
    trace_statements:
      - context: span
        statements:
          - replace_pattern(attributes["http.url"], "(?i)(token|key|secret)=[^&]+", "$$1=***REDACTED***")

  # Drop attributes that may carry raw credentials regardless of source.
  attributes/scrub:
    actions:
      - key: anthropic.api_key
        action: delete
      - key: authorization
        action: delete
      - key: env.ANTHROPIC_API_KEY
        action: delete
      - key: env.GITHUB_TOKEN
        action: delete

  resourcedetection:
    detectors: [env, system]
    timeout: 2s

exporters:
  # Elastic ingests OTLP natively (APM Server / managed OTLP endpoint).
  otlphttp/elastic:
    endpoint: ${env:ELASTIC_OTLP_ENDPOINT}
    headers:
      Authorization: ${env:ELASTIC_OTLP_AUTHORIZATION}
    tls:
      insecure: false

  # Stderr echo kept terse to honor the buffer-exhaustion guidance.
  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resourcedetection, transform/scrub, attributes/scrub, batch]
      exporters: [otlphttp/elastic]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, resourcedetection, attributes/scrub, batch]
      exporters: [otlphttp/elastic]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, resourcedetection, transform/scrub, attributes/scrub, batch]
      exporters: [otlphttp/elastic, debug]
  telemetry:
    logs:
      level: warn
