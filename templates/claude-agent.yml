# GitLab CI/CD component: claude-agent
#
# Full parity with the GitHub Actions workflow (.github/workflows/claude-agent.yml):
# two personalities, an OTel Collector sidecar, optional OpenBao secret fetch, and
# per-run cost emission. Runs inside the rootless Podman sandbox image.
#
#   * claude-advisor — READ-ONLY. Runs on a merge_request_event: reviews the diff,
#                      writes review.md, posts it back as an MR note. It is told
#                      not to mutate; pass a non-bypass `claude_args` to enforce it
#                      with real approvals if you don't trust the prompt alone.
#   * claude-agent   — READ-WRITE. Runs when CLAUDE_TASK is set (GitLab has no
#                      native "MR comment" pipeline trigger like GitHub's
#                      issue_comment, so the task is supplied via the `prompt`
#                      input or a CLAUDE_TASK pipeline variable from a manual run,
#                      trigger token, or webhook). Applies the change on a new
#                      branch and opens a NEW merge request — never pushes to the
#                      default branch.
#
# Usage:
#   include:
#     - component: $CI_SERVER_FQDN/<group>/claude-ci-agent/claude-agent@<version>
#       inputs:
#         # advisor needs no prompt; agent uses this (or a CLAUDE_TASK variable):
#         prompt: "Fix the failing unit tests and commit the change."
#
# Required CI/CD variables (Settings → CI/CD → Variables; mask + protect secrets):
#   ANTHROPIC_API_KEY        Your team's Anthropic key (name overridable via the
#                            api_key_variable input). Taken by NAME, never as an
#                            input — inputs interpolate as plaintext and would leak.
#   GITLAB_TOKEN             Project/group access token used to push the branch and
#                            open/comment on MRs. Needs the 'write_repository' AND
#                            'api' scopes and at least the Developer role — a
#                            read-only token gets a 403 on git push. Name overridable
#                            via token_variable. CI_JOB_TOKEN is NOT sufficient.
# Optional — telemetry export (no sidecar starts unless ELASTIC_OTLP_ENDPOINT set):
#   ELASTIC_OTLP_ENDPOINT, ELASTIC_OTLP_AUTHORIZATION
# Optional — corporate proxy (set as CI/CD variables). Honored by claude, git and
# curl, normalized to upper+lower case, and forwarded into the OTel sidecar.
# `localhost`/127.0.0.1 are auto-added to NO_PROXY so the OTLP export is never
# proxied; add your internal GitLab/Elastic hosts to NO_PROXY yourself if needed:
#   HTTP_PROXY, HTTPS_PROXY, NO_PROXY
# Optional — OpenBao addon (mint secrets via this job's OIDC JWT, nothing stored):
#   BAO_ADDR, BAO_ROLE, BAO_SECRET_PATH   (audience via the bao_audience input)
#
# HINT — prefer a short-lived, rotated Anthropic key scoped to a dedicated
# workspace with a spend limit (or minted on demand via the OpenBao addon). The
# API key is the one leaked credential that bills straight to your account, and a
# CI variable is exposed to every job, log, and cache — short-lived +
# workspace-scoped + spend-capped shrinks both the window and the blast radius.
#
# NOTE — `claude` runs directly in this job's container, which IS the rootless
# sandbox image (the GitLab runner starts the job in it via `image:`). Nested
# Podman is used only when needed: to start the OTel sidecar below, and by the
# agent itself when a task builds/tests app images. So a plain run needs no
# nested Podman; only the sidecar (and image-building tasks) do. If your runner
# can't do nested rootless Podman, set ELASTIC_OTLP_ENDPOINT empty to skip the
# sidecar — the agent still runs; only the exported audit trail is lost.
#
# Reference: https://docs.gitlab.com/ee/ci/components/
spec:
  inputs:
    stage:
      default: test
      description: Pipeline stage both jobs run in.
    image:
      default: ghcr.io/bigg01/claude-ci-agent/claude-agent:0.1.0-alpha.12
      description: >-
        Container image providing the Claude Code CLI + baked CI helpers (the
        published sandbox image). Pin to a released tag; override to a mirror.
    prompt:
      default: ""
      description: >-
        Task handed to the AGENT personality. Leave empty for advisor-only use;
        a CLAUDE_TASK pipeline variable overrides it for ad-hoc agent runs.
    branch_prefix:
      default: "claude/task-"
      description: >-
        Prefix for the branch the AGENT pushes; the pipeline id is appended for
        uniqueness (e.g. claude/task-1234). Override to change the namespace — but
        keep it in sync with any advisor `rules:` that match on the branch name.
    model:
      default: "claude-sonnet-4-6"
      description: Claude model id passed to `claude --model`.
    api_key_variable:
      default: "ANTHROPIC_API_KEY"
      description: >-
        Name of the masked, protected CI/CD variable holding your Anthropic API
        key. Pass the variable NAME here, not the key. The job fails fast with
        instructions if it is unset.
    token_variable:
      default: "GITLAB_TOKEN"
      description: >-
        Name of the CI/CD variable holding a GitLab token used to push the branch
        and open/comment on MRs. Needs the 'write_repository' and 'api' scopes and
        at least the Developer role. Pass the NAME, not the token.
    claude_args:
      default: "--dangerously-skip-permissions"
      description: >-
        Extra flags passed to `claude`. Defaults to bypass-permissions ("YOLO")
        mode, safe because the agent runs fully contained — see docs/yolo-mode.md.
        Set to an empty string to require approvals.
    otel_endpoint:
      default: "http://localhost:4318"
      description: OTLP endpoint the agent exports to (the sidecar listens here).
    team:
      default: "default"
      description: team.name resource attribute, for per-team cost attribution.
    bao_audience:
      default: "$CI_SERVER_URL"
      description: >-
        Audience (aud) of the OIDC JWT minted for the OpenBao addon. Default is
        your GitLab URL; set to whatever your OpenBao JWT role expects.
---
# ---------------------------------------------------------------------------
# Shared base — secret resolution, optional OpenBao fetch, OTel sidecar, OTel
# env, and teardown. Hidden (.) so it never materializes as a job itself.
# ---------------------------------------------------------------------------
".claude-base":
  stage: $[[ inputs.stage ]]
  image: $[[ inputs.image ]]
  variables:
    CLAUDE_MODEL: $[[ inputs.model ]]
    CLAUDE_CODE_ENABLE_TELEMETRY: "1"
    OTEL_LOG_TOOL_CONTENT: "1"
    OTEL_METRICS_EXPORTER: otlp
    OTEL_LOGS_EXPORTER: otlp
    OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
    OTEL_EXPORTER_OTLP_ENDPOINT: $[[ inputs.otel_endpoint ]]
    # Short CI jobs exit before the 60s default flush — shorten it so the built-in
    # claude_code.cost.usage metric is exported, and tag the CI context.
    OTEL_METRIC_EXPORT_INTERVAL: "5000"
    OTEL_RESOURCE_ATTRIBUTES: "ci.system=gitlab,ci.pipeline.id=$CI_PIPELINE_ID,vcs.repository=$CI_PROJECT_PATH,vcs.ref=$CI_COMMIT_REF_NAME,vcs.revision=$CI_COMMIT_SHA,team.name=$[[ inputs.team ]]"
  # GitLab mints this OIDC JWT for the job; the OpenBao addon exchanges it for a
  # short-lived token (no static OpenBao credential is ever stored).
  id_tokens:
    BAO_JWT:
      aud: $[[ inputs.bao_audience ]]
  before_script:
    # 1. Resolve the Anthropic key from the named variable (indirect, so a custom
    #    or group-level variable name works), fail fast with instructions if unset.
    - |
      KEY_VAR="$[[ inputs.api_key_variable ]]"
      eval "KEY_VALUE=\${$KEY_VAR:-}"
      if [ -z "$KEY_VALUE" ]; then
        echo "ERROR: required secret \$$KEY_VAR is not set." >&2
        echo "Add your team's Anthropic API key as a masked, protected CI/CD" >&2
        echo "variable named '$KEY_VAR' (Settings → CI/CD → Variables, or at the" >&2
        echo "group level to share it across the team), then re-run the pipeline." >&2
        exit 1
      fi
      export ANTHROPIC_API_KEY="$KEY_VALUE"
    # 2. Corporate proxy — no-op unless a proxy variable is set. Mirror it to both
    #    upper/lower case (claude/Node prefer UPPER, git/curl prefer lower) and
    #    force localhost into NO_PROXY so the OTLP export to localhost:4318 is never
    #    routed through the proxy.
    - |
      if [ -n "${HTTPS_PROXY:-}${https_proxy:-}${HTTP_PROXY:-}${http_proxy:-}" ]; then
        export HTTPS_PROXY="${HTTPS_PROXY:-${https_proxy:-}}" https_proxy="${https_proxy:-${HTTPS_PROXY:-}}"
        export HTTP_PROXY="${HTTP_PROXY:-${http_proxy:-}}"   http_proxy="${http_proxy:-${HTTP_PROXY:-}}"
        _np="${NO_PROXY:-${no_proxy:-}}"
        case ",${_np}," in *,localhost,*) : ;; *) _np="${_np:+$_np,}localhost,127.0.0.1" ;; esac
        export NO_PROXY="$_np" no_proxy="$_np"
        echo "Proxy configured — claude/git/curl routed via the proxy; NO_PROXY=$_np" >&2
      fi
    # 3. Optional OpenBao fetch — no-op unless BAO_ADDR is set. Sourced secrets
    #    (e.g. ELASTIC_*, GITLAB_TOKEN) become available to the rest of the job.
    - |
      if [ -n "${BAO_ADDR:-}" ]; then
        sh /opt/claude-ci/fetch-secrets.sh
        [ -f bao.env ] && { set -a; . ./bao.env; set +a; rm -f bao.env; }
      fi
    # 4. Start the OTel Collector sidecar (nested Podman, shares the job network)
    #    only when an Elastic endpoint is configured — otherwise skip it; the
    #    agent's best-effort export to localhost:4318 just no-ops. Proxy vars are
    #    forwarded so the collector can reach Elastic through a corporate proxy.
    - |
      if [ -n "${ELASTIC_OTLP_ENDPOINT:-}" ]; then
        podman run -d --name otel-collector --network host \
          -e ELASTIC_OTLP_ENDPOINT -e ELASTIC_OTLP_AUTHORIZATION \
          -e HTTP_PROXY -e HTTPS_PROXY -e NO_PROXY \
          -e http_proxy -e https_proxy -e no_proxy \
          -v /opt/claude-ci/otel-collector-config.yaml:/etc/otelcol/config.yaml:ro,Z \
          docker.io/otel/opentelemetry-collector-contrib:latest \
          --config /etc/otelcol/config.yaml
      else
        echo "ELASTIC_OTLP_ENDPOINT unset — skipping OTel sidecar (no export)." >&2
      fi
  after_script:
    # Flush before teardown: wait out the collector batch timeout (5s) + metric
    # export interval (5s) so the final datapoints reach Elastic, then stop it.
    - |
      if podman container exists otel-collector 2>/dev/null; then
        sleep 10
        podman logs otel-collector || true
        podman stop otel-collector || true
      fi

# ---------------------------------------------------------------------------
# ADVISOR (read-only): review the MR diff and post the review as an MR note.
# ---------------------------------------------------------------------------
"claude-advisor":
  extends: ".claude-base"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  script:
    - |
      claude -p "You are the ADVISOR personality (read-only). Review this merge \
      request against the repository's conventions (CLAUDE.md / CONTRIBUTING if \
      present). Run linters and tests, flag bugs and risks, and write your review \
      to review.md. You MUST NOT modify project files, commit, or push — recommend \
      changes, do not apply them." \
        --model "$CLAUDE_MODEL" $[[ inputs.claude_args ]] \
        --output-format json > claude-result.json
    - python3 /opt/claude-ci/emit_cost.py claude-result.json || true
    - |
      test -f review.md || echo "Advisor produced no review.md." > review.md
      TOKEN_VAR="$[[ inputs.token_variable ]]"
      eval "GL_TOKEN=\${$TOKEN_VAR:-}"
      if [ -n "$GL_TOKEN" ] && [ -n "${CI_MERGE_REQUEST_IID:-}" ]; then
        jq -Rs '{body: .}' review.md | \
          curl -sS -X POST \
            -H "PRIVATE-TOKEN: $GL_TOKEN" \
            -H "Content-Type: application/json" \
            "$CI_API_V4_URL/projects/$CI_PROJECT_ID/merge_requests/$CI_MERGE_REQUEST_IID/notes" \
            -d @-
      else
        echo "No $TOKEN_VAR or MR IID — echoing review to the job log instead:" >&2
        cat review.md
      fi
  # Keep the raw Claude run output (usage, cost, result) and the written review as
  # downloadable artifacts — `when: always` so they survive a failed note post.
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - claude-result.json
      - review.md

# ---------------------------------------------------------------------------
# AGENT (read-write): apply the task on a new branch and open a NEW merge
# request. Triggered by a non-empty CLAUDE_TASK (the `prompt` input, or a
# pipeline variable from a manual run / trigger token / webhook).
# ---------------------------------------------------------------------------
"claude-agent":
  extends: ".claude-base"
  variables:
    # Default the task to the prompt input; a CLAUDE_TASK pipeline variable
    # (manual/trigger/webhook) takes precedence over this job-level default.
    CLAUDE_TASK: $[[ inputs.prompt ]]
  rules:
    - if: '$CLAUDE_TASK != ""'
  script:
    - |
      claude -p "You are the AGENT personality (read-write). Task: $CLAUDE_TASK. \
      Work per the repository's conventions, and make atomic, conventional-commit- \
      style changes." \
        --model "$CLAUDE_MODEL" $[[ inputs.claude_args ]] \
        --output-format json > claude-result.json
    - python3 /opt/claude-ci/emit_cost.py claude-result.json || true
    - |
      TOKEN_VAR="$[[ inputs.token_variable ]]"
      eval "GL_TOKEN=\${$TOKEN_VAR:-}"
      if [ -z "$GL_TOKEN" ]; then
        echo "ERROR: \$$TOKEN_VAR is required to push a branch and open an MR." >&2
        echo "Use a project/group access token with the 'write_repository' AND 'api'" >&2
        echo "scopes and at least the Developer role — a read-only token gets a 403" >&2
        echo "'You are not allowed to push code to this project' on git push." >&2
        exit 1
      fi
      git config user.email "claude-agent@ci.local"
      git config user.name "Claude CI Agent"
      BRANCH="$[[ inputs.branch_prefix ]]${CI_PIPELINE_ID}"
      git checkout -b "$BRANCH"
      # Stage the agent's WORK only. Exclude this job's own run output
      # (claude-result.json, review.md) — it stays on disk for the artifact
      # upload below, but must never land in the agent's commit.
      git add -A -- ':!claude-result.json' ':!review.md'
      if git diff --cached --quiet; then
        echo "⚠ Agent produced NO file changes — so no branch/MR was created and the" >&2
        echo "  advisor has nothing to review. What the agent reported:" >&2
        jq -r '.result // "(no result text)"' claude-result.json | sed 's/^/    /' >&2
        echo "  Unstaged working-tree state (empty = the agent wrote nothing):" >&2
        git status --porcelain | sed 's/^/    /' >&2 || true
        echo "  If you expected changes: confirm the task/spec is in the repo, and run" >&2
        echo "  the IMPLEMENTER on a capable model (claude-sonnet-4-6 / opus — a small" >&2
        echo "  model like haiku often stalls on autonomous multi-file work). Note that" >&2
        echo "  a project CLAUDE_MODEL CI/CD variable overrides the component default." >&2
        exit 0
      fi
      git commit -m "feat: automated change by Claude agent"
      git push "https://oauth2:${GL_TOKEN}@${CI_SERVER_HOST}:${CI_SERVER_PORT}/${CI_PROJECT_PATH}.git" "$BRANCH"
      MR_RESP="$(jq -n \
        --arg s "$BRANCH" \
        --arg t "${CI_DEFAULT_BRANCH:-main}" \
        --arg title "Claude agent: $CLAUDE_TASK" \
        '{source_branch: $s, target_branch: $t, title: $title, description: "Automated change opened by the Claude CI agent.", remove_source_branch: true}' | \
        curl -sS -X POST \
          -H "PRIVATE-TOKEN: $GL_TOKEN" \
          -H "Content-Type: application/json" \
          "$CI_API_V4_URL/projects/$CI_PROJECT_ID/merge_requests" \
          -d @-)"
      # Summary of what the agent actually did (only reached when it changed files).
      echo "──────────────── Claude agent summary ────────────────"
      echo "Branch:  $BRANCH → ${CI_DEFAULT_BRANCH:-main}"
      echo "MR:      $(printf '%s' "$MR_RESP" | jq -r '.web_url // "(MR not created — check the token role/scope)"')"
      echo "Files changed:"
      git show --stat --format= HEAD | sed 's/^/  /'
      echo "What the agent reports doing:"
      jq -r '.result // "(no result text)"' claude-result.json | sed 's/^/  /'
      echo "───────────────────────────────────────────────────────"
  # Keep the raw Claude run output (usage, cost, result) as a downloadable
  # artifact — `when: always` so it survives a failed push / MR creation.
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - claude-result.json
